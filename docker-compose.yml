version: '3.9'

# docker-compose configuration for local development.  A simple PostgreSQL instance is
# provided for the application database.  Additional services such as Langfuse or
# Promptfoo are **not** bundled in phase 1; instead those integrate via API
# using environment variables.
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidv
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: